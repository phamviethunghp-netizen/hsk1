<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK1 PRO - ANDROID</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .lesson-card:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const playAudio = (text) => {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        };

        const DATA = [
            { id: 1, title: "Đại từ & Chào hỏi", vocab: [{hz:"我",py:"wǒ",vi:"tôi"},{hz:"你",py:"nǐ",vi:"bạn"},{hz:"他",py:"tā",vi:"anh ấy"},{hz:"她",py:"tā",vi:"cô ấy"},{hz:"我们",py:"wǒmen",vi:"chúng tôi"},{hz:"你好",py:"nǐ hǎo",vi:"chào bạn"},{hz:"您",py:"nín",vi:"ngài"},{hz:"老师",py:"lǎoshī",vi:"giáo viên"}], grammar: "1. Đại từ nhân xưng: 我, 你, 他. \n2. Số nhiều: Thêm '们' (men) sau đại từ. VD: 我们 (chúng tôi), 你们 (các bạn). \n3. Lời chào: Đại từ + 好. VD: 老师好 (Chào thầy).", sentences: [{hz:"老师好！",py:"Lǎoshī hǎo!",vi:"Chào thầy giáo!"},{hz:"你们好。",py:"Nǐmen hǎo.",vi:"Chào các bạn."}], quiz: { q: "Từ nào là 'Chúng tôi'?", opts: ["你们", "我们", "他们"], ans: 1 } },
            { id: 2, title: "Số đếm & Lượng từ", vocab: [{hz:"一",py:"yī",vi:"1"},{hz:"二",py:"èr",vi:"2"},{hz:"三",py:"sān",vi:"3"},{hz:"四",py:"sì",vi:"4"},{hz:"五",py:"wǔ",vi:"5"},{hz:"六",py:"liù",vi:"6"},{hz:"七",py:"qī",vi:"7"},{hz:"八",py:"bā",vi:"8"},{hz:"九",py:"jiǔ",vi:"9"},{hz:"十",py:"shí",vi:"10"},{hz:"个",py:"gè",vi:"cái"}], grammar: "1. Lượng từ '个' (gè): Dùng phổ biến nhất. \n2. Cấu trúc: Số + Lượng từ + Danh từ. VD: 三个人 (3 người). \n3. Lưu ý: Số 2 khi đi với lượng từ dùng '两' (liǎng) thay vì '二'.", sentences: [{hz:"五个人",py:"Wǔ gè rén",vi:"5 người"},{hz:"十块",py:"Shí kuài",vi:"10 tệ."}], quiz: { q: "Số 8 phát âm là gì?", opts: ["sì", "bā", "liù"], ans: 1 } },
            { id: 3, title: "Sở hữu cách với 的", vocab: [{hz:"家",py:"jiā",vi:"nhà"},{hz:"爸爸",py:"bàba",vi:"bố"},{hz:"妈妈",py:"māma",vi:"mẹ"},{hz:"儿子",py:"érzi",vi:"con trai"},{hz:"女儿",py:"nǚ'ér",vi:"con gái"},{hz:"朋友",py:"péngyou",vi:"bạn bè"},{hz:"的",py:"de",vi:"của"}], grammar: "1. Cấu trúc sở hữu: A + 的 + B (B của A). VD: 我的家 (Nhà của tôi). \n2. Nếu mối quan hệ thân thiết (gia đình), có thể bỏ '的'. VD: 我爸爸 (Bố tôi).", sentences: [{hz:"我的书",py:"Wǒ de shū",vi:"Sách của tôi"},{hz:"我妈妈",py:"Wǒ māma",vi:"Mẹ tôi"}], quiz: { q: "'Sách của tôi'?", opts: ["我的书", "你的书", "他的书"], ans: 0 } },
            { id: 4, title: "Thời gian & Ngày tháng", vocab: [{hz:"年",py:"nián",vi:"năm"},{hz:"月",py:"yuè",vi:"tháng"},{hz:"日",py:"rì",vi:"ngày"},{hz:"星期",py:"xīngqī",vi:"thứ"},{hz:"现在",py:"xiànzài",vi:"bây giờ"},{hz:"点",py:"diǎn",vi:"giờ"},{hz:"分钟",py:"fēnzhōng",vi:"phút"}], grammar: "1. Thứ tự: Năm -> Tháng -> Ngày -> Thứ. \n2. Cách nói thứ: 星期 + Số (Riêng Chủ Nhật là 星期日). \n3. Thời gian luôn đứng trước động từ hoặc làm chủ ngữ.", sentences: [{hz:"今天星期一。",py:"Jīntiān xīngqī yī.",vi:"Hôm nay thứ hai."},{hz:"现在三点。",py:"Xiànzài sān diǎn.",vi:"Bây giờ 3 giờ."}], quiz: { q: "'Hôm nay' là gì?", opts: ["昨天", "现在", "今天"], ans: 2 } },
            { id: 5, title: "Ăn uống (Động từ + Tân ngữ)", vocab: [{hz:"吃",py:"chī",vi:"ăn"},{hz:"喝",py:"hē",vi:"uống"},{hz:"米饭",py:"mǐfàn",vi:"cơm"},{hz:"水",py:"shuǐ",vi:"nước"},{hz:"茶",py:"chá",vi:"trà"},{hz:"苹果",py:"píngguǒ",vi:"táo"},{hz:"水果",py:"shuǐguǒ",vi:"hoa quả"}], grammar: "1. Cấu trúc: S + V + O. VD: 我吃米饭 (Tôi ăn cơm). \n2. Câu cầu khiến: '请' (qǐng) + Hành động. VD: 请喝茶 (Mời uống trà).", sentences: [{hz:"我吃水果。",py:"Wǒ chī shuǐguǒ.",vi:"Tôi ăn hoa quả."},{hz:"请喝水。",py:"Qǐng hē shuǐ.",vi:"Mời uống nước."}], quiz: { q: "'Uống nước' là gì?", opts: ["喝茶", "喝水", "吃水"], ans: 1 } },
            { id: 6, title: "Ở đâu (Cấu trúc 在)", vocab: [{hz:"在",py:"zài",vi:"ở/đang"},{hz:"哪儿",py:"nǎr",vi:"đâu"},{hz:"学校",py:"xuéxiào",vi:"trường học"},{hz:"饭店",py:"fàndiàn",vi:"nhà hàng"},{hz:"医院",py:"yīyuàn",vi:"bệnh viện"},{hz:"商店",py:"shāngdiàn",vi:"cửa hàng"},{hz:"中国",py:"zhōngguó",vi:"Trung Quốc"}], grammar: "1. '在' vừa là động từ (ở), vừa là giới từ (tại). \n2. Cấu trúc hỏi: S + 在 + 哪儿? \n3. Cấu trúc làm gì ở đâu: S + 在 + Địa điểm + Động từ. VD: 我在学校学习 (Tôi học ở trường).", sentences: [{hz:"你在哪儿？",py:"Nǐ zài nǎr?",vi:"Bạn ở đâu?"},{hz:"我在医院。",py:"Wǒ zài yīyuàn.",vi:"Tôi ở bệnh viện."}], quiz: { q: "'Trường học'?", opts: ["学校", "医院", "商店"], ans: 0 } },
            { id: 7, title: "Công việc & Học tập", vocab: [{hz:"做",py:"zuò",vi:"làm"},{hz:"工作",py:"gōngzuò",vi:"công việc"},{hz:"学习",py:"xuéxí",vi:"học tập"},{hz:"写",py:"xiě",vi:"viết"},{hz:"读",py:"dú",vi:"đọc"},{hz:"汉字",py:"hànzì",vi:"chữ Hán"},{hz:"看",py:"kàn",vi:"xem/nhìn"}], grammar: "1. Từ '做' (zuò) dùng cho các công việc chung. \n2. '看' (kàn) có thể nghĩa là nhìn, xem, hoặc đọc (sách).", sentences: [{hz:"你在做什么？",py:"Nǐ zài zuò shénme?",vi:"Bạn đang làm gì?"},{hz:"我在学习。",py:"Wǒ zài xuéxí.",vi:"Tôi đang học tập."}], quiz: { q: "'Viết chữ Hán'?", opts: ["写汉字", "读汉字", "看汉字"], ans: 0 } },
            { id: 8, title: "Đồ vật & Vị trí (上, 下)", vocab: [{hz:"桌子",py:"zhuōzi",vi:"cái bàn"},{hz:"椅子",py:"yǐzi",vi:"cái ghế"},{hz:"电脑",py:"diànnǎo",vi:"máy tính"},{hz:"书",py:"shū",vi:"sách"},{hz:"杯子",py:"bēizi",vi:"cốc"},{hz:"上",py:"shàng",vi:"trên"},{hz:"下",py:"xià",vi:"dưới"}], grammar: "1. Từ chỉ phương vị: Đứng SAU danh từ chính. \n2. Cấu trúc: Danh từ + 上 (shàng) / 下 (xià). VD: 桌子上 (Trên bàn).", sentences: [{hz:"电脑在桌子上。",py:"Diànnǎo zài zhuōzi shàng.",vi:"Máy tính ở trên bàn."},{hz:"椅子下",py:"yǐzi xià",vi:"Dưới ghế"}], quiz: { q: "'Trên bàn'?", opts: ["桌子上", "椅子上", "电脑上"], ans: 0 } },
            { id: 9, title: "Lịch sự & Xin lỗi", vocab: [{hz:"谢谢",py:"xièxie",vi:"cảm ơn"},{hz:"不客气",py:"bú kèqi",vi:"đừng khách sáo"},{hz:"对不起",py:"duìbuqǐ",vi:"xin lỗi"},{hz:"没关系",py:"méi guānxi",vi:"không sao"},{hz:"再见",py:"zàijiàn",vi:"tạm biệt"}], grammar: "1. Cặp đối thoại: 谢谢 -> 不客气. \n2. Cặp đối thoại: 对不起 -> 没关系.", sentences: [{hz:"谢谢你。",py:"Xièxie nǐ.",vi:"Cảm ơn bạn."},{hz:"没关系。",py:"Méi guānxi.",vi:"Không sao đâu."}], quiz: { q: "Đáp lại 'Cảm ơn'?", opts: ["再见", "不客气", "对不起"], ans: 1 } },
            { id: 10, title: "Năng lực (会 & 想)", vocab: [{hz:"喜欢",py:"xǐhuan",vi:"thích"},{hz:"想",py:"xiǎng",vi:"muốn/nhớ"},{hz:"爱",py:"ài",vi:"yêu"},{hz:"会",py:"huì",vi:"biết (kỹ năng)"},{hz:"能",py:"néng",vi:"có thể"}], grammar: "1. '会' (huì): Biết làm gì thông qua học tập. VD: 我会说汉语 (Tôi biết nói tiếng Trung). \n2. '想' (xiǎng): Thể hiện mong muốn, dự định.", sentences: [{hz:"我会说汉语。",py:"Wǒ huì shuō Hànyǔ.",vi:"Tôi biết nói tiếng Trung."},{hz:"我想吃米饭。",py:"Wǒ xiǎng chī mǐfàn.",vi:"Tôi muốn ăn cơm."}], quiz: { q: "'Biết nói' dùng từ nào?", opts: ["会", "想", "爱"], ans: 0 } },
            { id: 11, title: "Mua sắm (多少钱)", vocab: [{hz:"钱",py:"qián",vi:"tiền"},{hz:"块",py:"kuài",vi:"đồng (tệ)"},{hz:"买",py:"mǎi",vi:"mua"},{hz:"多少",py:"duōshao",vi:"bao nhiêu"},{hz:"衣服",py:"yīfu",vi:"quần áo"}], grammar: "1. '多少' (duōshao): Dùng hỏi số lượng lớn hoặc không xác định. \n2. Hỏi giá: 多少钱 (Duōshao qián)? \n3. Đơn vị tiền tệ khẩu ngữ là '块' (kuài).", sentences: [{hz:"这个多少钱？",py:"Zhège duōshao qián?",vi:"Cái này bao nhiêu tiền?"},{hz:"五块。",py:"Wǔ kuài.",vi:"5 tệ."}], quiz: { q: "'Mua quần áo'?", opts: ["买衣服", "买钱", "买东西"], ans: 0 } },
            { id: 12, title: "Nghi vấn (谁, 什么)", vocab: [{hz:"谁",py:"shéi",vi:"ai"},{hz:"什么",py:"shénme",vi:"cái gì"},{hz:"名字",py:"míngzi",vi:"tên"},{hz:"同学",py:"tóngxué",vi:"bạn học"},{hz:"学生",py:"xuésheng",vi:"học sinh"},{hz:"医生",py:"yīshēng",vi:"bác sĩ"}], grammar: "1. Câu hỏi trong tiếng Trung không đảo ngữ. \n2. '什么' (shénme) đứng trước danh từ. VD: 什么名字 (tên gì?).", sentences: [{hz:"他是谁？",py:"Tā shì shéi?",vi:"Anh ấy là ai?"},{hz:"你叫什么名字？",py:"Nǐ jiào shénme míngzi?",vi:"Bạn tên là gì?"}], quiz: { q: "'Ai' tiếng Trung là gì?", opts: ["名字", "谁", "什么"], ans: 1 } },
            { id: 13, title: "Mức độ (很, 太...了)", vocab: [{hz:"大",py:"dà",vi:"lớn"},{hz:"小",py:"xiǎo",vi:"nhỏ"},{hz:"冷",py:"lěng",vi:"lạnh"},{hz:"热",py:"rè",vi:"nóng"},{hz:"很",py:"hěn",vi:"rất"},{hz:"太",py:"tài",vi:"quá"},{hz:"漂亮",py:"piàoliang",vi:"đẹp"}], grammar: "1. '很' (hěn): Thường đứng trước tính từ để tạo câu khẳng định. \n2. '太...了' (tài...le): Quá/Cực kỳ cái gì đó. VD: 太好了 (Tốt quá rồi).", sentences: [{hz:"今天很冷。",py:"Jīntiān hěn lěng.",vi:"Hôm nay rất lạnh."},{hz:"漂亮极了！",py:"Piàoliang jíle!",vi:"Đẹp quá đi!"}], quiz: { q: "'Rất nóng' là gì?", opts: ["很大", "很热", "很冷"], ans: 1 } },
            { id: 14, title: "Đi lại (坐...去...)", vocab: [{hz:"去",py:"qù",vi:"đi"},{hz:"来",py:"lái",vi:"đến"},{hz:"坐",py:"zuò",vi:"ngồi/đi (xe)"},{hz:"飞机",py:"fēijī",vi:"máy bay"},{hz:"出租车",py:"chūzūchē",vi:"taxi"},{hz:"火车站",py:"huǒchēzhàn",vi:"ga tàu"}], grammar: "1. Cách nói đi đâu bằng xe gì: 坐 + Xe + 去 + Địa điểm. \n2. VD: 坐飞机去中国 (Đi Trung Quốc bằng máy bay).", sentences: [{hz:"坐出租车去学校。",py:"Zuò chūzūchē qù xuéxiào.",vi:"Đi taxi đến trường."}], quiz: { q: "'Taxi' là gì?", opts: ["飞机", "出租车", "ga tàu"], ans: 1 } },
            { id: 15, title: "Thời tiết & Trợ từ 了", vocab: [{hz:"天气",py:"tiānqì",vi:"thời tiết"},{hz:"下雨",py:"xiàyǔ",vi:"mưa"},{hz:"怎么样",py:"zěnmeyàng",vi:"thế nào"},{hz:"了",py:"le",vi:"rồi"}], grammar: "1. '了' (le): Đứng cuối câu chỉ sự thay đổi trạng thái hoặc hành động đã xảy ra. \n2. Hỏi tình hình: ...怎么样? VD: 天气怎么样 (Thời tiết thế nào?).", sentences: [{hz:"明天天气怎么样？",py:"Míngtiān tiānqì zěnmeyàng?",vi:"Ngày mai thời tiết thế nào?"},{hz:"下雨了。",py:"Xiàyǔ le.",vi:"Mưa rồi."}], quiz: { q: "'Trời mưa' là gì?", opts: ["下雨", "天气", "怎么样"], ans: 0 } }
        ];

        function App() {
            const [tab, setTab] = useState('home');
            const [selected, setSelected] = useState(null);
            const [progress, setProgress] = useState(JSON.parse(localStorage.getItem('hsk_pro')) || {});

            const saveProgress = (id) => {
                const p = {...progress, [id]: true};
                setProgress(p);
                localStorage.setItem('hsk_pro', JSON.stringify(p));
                setSelected(null);
                window.scrollTo(0,0);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 shadow-2xl bg-white overflow-x-hidden">
                    <header className="bg-gradient-to-br from-red-600 to-red-500 text-white p-10 rounded-b-[50px] shadow-xl text-center">
                        <h1 className="text-4xl font-extrabold tracking-tight">HSK1 PRO 🇨🇳</h1>
                        <p className="text-red-100 mt-2 font-medium">Ngữ pháp - Từ vựng - Audio</p>
                    </header>

                    <main className="px-5 py-8">
                        {tab === 'home' && !selected && (
                            <div className="animate-in fade-in slide-in-from-bottom-6 duration-500">
                                <div className="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 mb-8 flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-400 text-xs font-bold uppercase tracking-widest italic">Hành trình của bạn</p>
                                        <h2 className="text-3xl font-black text-gray-800">{Math.round((Object.keys(progress).length/15)*100)}%</h2>
                                    </div>
                                    <div className="w-20 h-20 relative flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90">
                                            <circle cx="40" cy="40" r="34" stroke="currentColor" strokeWidth="8" fill="transparent" className="text-gray-100" />
                                            <circle cx="40" cy="40" r="34" stroke="currentColor" strokeWidth="8" fill="transparent" strokeDasharray={213} strokeDashoffset={213 - (213 * (Object.keys(progress).length || 0) / 15)} className="text-red-500 transition-all duration-1000" />
                                        </svg>
                                        <span className="absolute text-xs font-bold">{Object.keys(progress).length}/15</span>
                                    </div>
                                </div>

                                <div className="grid gap-5">
                                    {DATA.map(lesson => (
                                        <div key={lesson.id} onClick={() => setSelected(lesson)} className="lesson-card bg-white p-6 rounded-3xl flex items-center gap-5 shadow-md border border-gray-50 hover:border-red-200 transition-all cursor-pointer relative overflow-hidden group">
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-xl ${progress[lesson.id] ? 'bg-green-100 text-green-600' : 'bg-red-50 text-red-500'}`}>
                                                {progress[lesson.id] ? <i className="fas fa-check"></i> : lesson.id}
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-gray-800 text-lg leading-tight">{lesson.title}</h3>
                                                <p className="text-xs text-gray-400 mt-1">Full Kiến thức + Trắc nghiệm</p>
                                            </div>
                                            <i className="fas fa-play-circle text-gray-200 group-hover:text-red-400 text-2xl transition-colors"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {selected && (
                            <div className="animate-in slide-in-from-right duration-300">
                                <button onClick={() => setSelected(null)} className="flex items-center gap-2 text-red-500 font-bold mb-8 text-sm bg-red-50 px-4 py-2 rounded-full">
                                    <i className="fas fa-arrow-left"></i> QUAY LẠI TRANG CHỦ
                                </button>

                                {/* NGỮ PHÁP - MỚI BỔ SUNG CHI TIẾT */}
                                <div className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-blue-500 mb-8">
                                    <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        <i className="fas fa-book-open text-blue-500"></i> KIẾN THỨC NGỮ PHÁP
                                    </h2>
                                    <div className="p-4 bg-blue-50 rounded-2xl whitespace-pre-wrap text-blue-900 leading-relaxed font-medium text-sm">
                                        {selected.grammar}
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-red-500 mb-8">
                                    <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        <i className="fas fa-language text-red-500"></i> TỪ VỰNG & PHÁT ÂM
                                    </h2>
                                    <div className="space-y-4">
                                        {selected.vocab.map((v, i) => (
                                            <div key={i} onClick={() => playAudio(v.hz)} className="flex items-center justify-between p-4 bg-gray-50 rounded-2xl cursor-pointer active:bg-red-50 border border-transparent hover:border-red-100 group transition-all">
                                                <div>
                                                    <p className="text-3xl font-bold text-red-600 flex items-center gap-2">{v.hz} <i className="fas fa-volume-up text-xs text-gray-300 group-hover:text-red-400"></i></p>
                                                    <p className="text-sm font-bold text-blue-500 uppercase tracking-tighter mt-1">{v.py}</p>
                                                </div>
                                                <p className="text-gray-700 font-bold text-lg">{v.vi}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-green-500 mb-8">
                                    <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        <i className="fas fa-comments text-green-500"></i> MẪU CÂU GIAO TIẾP
                                    </h2>
                                    <div className="space-y-4">
                                        {selected.sentences.map((s, i) => (
                                            <div key={i} onClick={() => playAudio(s.hz)} className="p-5 bg-green-50 rounded-3xl border border-green-100 cursor-pointer active:bg-green-100">
                                                <p className="text-xl font-bold text-gray-800 flex items-center gap-2">{s.hz} <i className="fas fa-volume-up text-xs text-green-300"></i></p>
                                                <p className="text-sm text-green-600 font-bold mb-2 italic tracking-tight">{s.py}</p>
                                                <p className="text-gray-600 font-medium">{s.vi}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-7 shadow-xl border-4 border-red-50 mb-12">
                                    <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2"><i className="fas fa-star text-yellow-400"></i> TRẮC NGHIỆM CUỐI BÀI</h2>
                                    <p className="font-bold text-lg text-gray-700 mb-6">{selected.quiz.q}</p>
                                    <div className="space-y-3">
                                        {selected.quiz.opts.map((opt, idx) => (
                                            <button key={idx} onClick={() => { if(idx === selected.quiz.ans) { playAudio("很好"); alert("TUYỆT VỜI! CHÍNH XÁC 🎉"); } else alert("SAI RỒI, CỐ GẮNG LÊN!"); }} className="w-full text-left p-5 border-2 border-gray-100 rounded-3xl font-bold text-gray-600 hover:border-red-400 hover:text-red-600 transition-all">{opt}</button>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={() => saveProgress(selected.id)} className="w-full bg-red-600 text-white py-6 rounded-[35px] font-black text-xl shadow-2xl active:scale-95 mb-20 tracking-widest uppercase">
                                    HOÀN THÀNH BÀI HỌC
                                </button>
                            </div>
                        )}

                        {tab === 'settings' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black mb-8 text-gray-800">Cài đặt</h2>
                                <div className="bg-white p-8 rounded-[40px] shadow-lg border border-gray-100">
                                    <label className="text-xs font-black text-gray-400 uppercase tracking-widest">Giờ học mỗi ngày</label>
                                    <input type="time" className="w-full text-5xl font-black border-b-4 border-red-500 py-6 outline-none text-red-600 bg-transparent mb-8" defaultValue="20:00" />
                                    <button onClick={() => { Notification.requestPermission(); alert("Nhắc nhở đã được thiết lập!"); }} className="w-full bg-red-600 text-white py-5 rounded-3xl font-black shadow-xl uppercase tracking-widest">LƯU THIẾT LẬP</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-gray-100 p-5 flex justify-around shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <button onClick={() => {setTab('home'); setSelected(null)}} className={`flex flex-col items-center gap-1 transition-all ${tab==='home'?'text-red-600 scale-110':'text-gray-300'}`}>
                            <i className="fas fa-home text-2xl"></i><span className="text-[10px] font-black uppercase">Trang chủ</span>
                        </button>
                        <button onClick={() => setTab('settings')} className={`flex flex-col items-center gap-1 transition-all ${tab==='settings'?'text-red-600 scale-110':'text-gray-300'}`}>
                            <i className="fas fa-clock text-2xl"></i><span className="text-[10px] font-black uppercase">Nhắc nhở</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
